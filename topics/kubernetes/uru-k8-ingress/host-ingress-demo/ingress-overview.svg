<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #f9fafb; }
    .box { fill: #ffffff; stroke: #3b82f6; stroke-width: 2; rx: 12; }
    .box-dark { fill: #1f2937; stroke: #2563eb; stroke-width: 2; rx: 12; }
    .text { font-family: Inter, Arial, sans-serif; fill: #111827; font-size: 14px; }
    .title { font-size: 20px; font-weight: 700; }
    .small { font-size: 12px; fill: #475569; }
    .arrow { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>
  <rect width="960" height="540" class="bg" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <text x="40" y="40" class="title">Kubernetes Ingress Overview</text>
  <rect x="60" y="80" width="240" height="120" class="box" />
  <text x="80" y="110" class="text" font-weight="700">Browser / Client</text>
  <text x="80" y="132" class="small">http://frontend.urukundu.com</text>
  <text x="80" y="152" class="small">Host: frontend.urukundu.com</text>

  <rect x="360" y="80" width="240" height="120" class="box" />
  <text x="380" y="110" class="text" font-weight="700">DNS / Load Balancer</text>
  <text x="380" y="132" class="small">Route 53 alias record</text>
  <text x="380" y="152" class="small">ELB DNS → public IPs</text>

  <rect x="660" y="80" width="240" height="120" class="box" />
  <text x="680" y="110" class="text" font-weight="700">Ingress Controller</text>
  <text x="680" y="132" class="small">NGINX / AWS ALB</text>
  <text x="680" y="152" class="small">Matches host + path</text>

  <path class="arrow" d="M300 140 L360 140" />
  <path class="arrow" d="M600 140 L660 140" />

  <rect x="60" y="240" width="280" height="220" class="box-dark" />
  <text x="80" y="280" class="text" fill="#f8fafc" font-weight="700">Kubernetes Cluster</text>
  <text x="80" y="306" class="small" fill="#e2e8f0">Service routing behind ingress</text>
  <rect x="100" y="330" width="180" height="56" fill="#111827" rx="10" />
  <text x="120" y="356" class="text" fill="#f8fafc">frontend-service</text>
  <text x="120" y="374" class="small" fill="#cbd5e1">port: 80</text>
  <rect x="100" y="400" width="180" height="56" fill="#111827" rx="10" />
  <text x="120" y="426" class="text" fill="#f8fafc">orders-service</text>
  <text x="120" y="444" class="small" fill="#cbd5e1">port: 80</text>

  <path class="arrow" d="M780 160 L780 240" />
  <path class="arrow" d="M780 240 L380 240" />
  <path class="arrow" d="M380 240 L380 260" />
  <path class="arrow" d="M380 260 Q380 280 320 300" />
  <path class="arrow" d="M320 300 L320 330" />
</svg>